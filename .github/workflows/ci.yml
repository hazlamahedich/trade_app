name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install
        run: uv venv --python 3.12 && source .venv/bin/activate && uv pip install -e ".[dev]"
      
      - name: Ruff check
        run: source .venv/bin/activate && ruff check src/ tests/

      - name: Ruff format check
        run: source .venv/bin/activate && ruff format --check src/ tests/

      - name: Mypy
        run: source .venv/bin/activate && mypy src/

      - name: Unit tests
        run: source .venv/bin/activate && pytest -x -m "not integration and not e2e"

  full-gate:
    name: Full Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install
        run: uv venv --python 3.12 && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Pre-commit (single source of truth)
        run: source .venv/bin/activate && pre-commit run --all-files

      - name: Tests with coverage
        run: source .venv/bin/activate && pytest --cov=trade_advisor --cov-report=xml -m "not e2e"

      - name: Integration tests
        run: source .venv/bin/activate && pytest -m integration

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
