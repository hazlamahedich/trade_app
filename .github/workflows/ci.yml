name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install
        run: uv venv --python ${{ env.PYTHON_VERSION }} && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Ruff check
        run: source .venv/bin/activate && ruff check src/ tests/

      - name: Ruff format check
        run: source .venv/bin/activate && ruff format --check src/ tests/

      - name: Mypy
        run: source .venv/bin/activate && mypy src/

  test:
    name: Unit Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install
        run: uv venv --python ${{ env.PYTHON_VERSION }} && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Run unit tests (shard ${{ matrix.shard }}/4)
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: "4"
        run: |
          source .venv/bin/activate
          mkdir -p test-results
          pytest --collect-only -q -m "not integration and not e2e" 2>/dev/null \
            | head -n -2 \
            | awk -v shard="$SHARD_INDEX" -v total="$SHARD_TOTAL" \
              'NR % total == (shard - 1) % total' \
            > test-files-shard.txt
          if [ -s test-files-shard.txt ]; then
            pytest $(cat test-files-shard.txt) \
              -m "not integration and not e2e" \
              --junitxml=test-results/junit-shard-${{ matrix.shard }}.xml \
              || pytest -m "not integration and not e2e" \
                --junitxml=test-results/junit-shard-${{ matrix.shard }}.xml
          else
            pytest -m "not integration and not e2e" \
              --junitxml=test-results/junit-shard-${{ matrix.shard }}.xml
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 30

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install
        run: uv venv --python ${{ env.PYTHON_VERSION }} && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest -m integration \
            --junitxml=test-results/junit-integration.xml

      - name: Upload integration results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: test-results/
          retention-days: 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, integration]
    if: always() && needs.test.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install
        run: uv venv --python ${{ env.PYTHON_VERSION }} && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest --cov=trade_advisor \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -m "not e2e" \
            --junitxml=test-results/junit-full.xml

      - name: Coverage quality gate
        run: |
          source .venv/bin/activate
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib.get('line-rate', '0'))
          pct = rate * 100
          print(f'Coverage: {pct:.1f}%')
          assert pct >= 70, f'Coverage {pct:.1f}% below 70% threshold'
          "

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-coverage
          path: test-results/
          retention-days: 30

  pre-commit:
    name: Pre-commit (Full)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install
        run: uv venv --python ${{ env.PYTHON_VERSION }} && source .venv/bin/activate && uv pip install -e ".[dev]"

      - name: Pre-commit run
        run: source .venv/bin/activate && pre-commit run --all-files

  report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test, integration, coverage, pre-commit]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Typecheck | \`${{ needs.lint.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (4 shards) | \`${{ needs.test.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | \`${{ needs.integration.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Gate | \`${{ needs.coverage.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit | \`${{ needs.pre-commit.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.coverage.result }}" == "failure" ]; then
            echo "**Pipeline failed** — check artifacts for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Pipeline passed**" >> $GITHUB_STEP_SUMMARY
          fi
